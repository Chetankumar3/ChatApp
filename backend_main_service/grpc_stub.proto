syntax = "proto3";

// Implemented by the Main Service — receives messages forwarded by CM workers
service MainRouter {
    rpc RouteInboundMessage (InboundMessage) returns (RoutingAck);
}

// Implemented by CM workers — receives delivery requests from Main Service
service ConnectionManager {
    rpc DeliverOutboundMessage (OutboundMessage) returns (DeliveryAck);
}

// CM → Main: user sent a message
message InboundMessage {
    int32  fromId      = 1;
    int32  toId        = 2;  // peer user_id or group_id
    string type        = 3;  // "direct_message" | "group_message"
    string body        = 4;
    string sentAt      = 5;  // ISO-8601 UTC
    string client_uuid = 6;  // client-generated dedup key, echoed back in ack
}

// Main → CM (inbound ack): message stored, here is the DB-assigned id
message RoutingAck {
    bool   success    = 1;
    int32  message_id = 2;
    string error      = 3;
}

// Main → CM: deliver this payload to one or more connected users on that CM
message OutboundMessage {
    repeated int32 target_user_ids = 1;  // users on THIS CM to deliver to
    int32  fromId     = 2;
    int32  toId       = 3;  // peer user_id or group_id (for client-side routing)
    string type       = 4;
    string body       = 5;
    string sentAt     = 6;
    int32  message_id = 7;  // DB-assigned id
}

// CM → Main (outbound ack)
message DeliveryAck {
    bool   success = 1;
    string error   = 2;
}
