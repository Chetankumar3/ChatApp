version: 1
disable_existing_loggers: False
formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  file:
    class: logging.FileHandler
    filename: "error.log"
    formatter: default
    level: ERROR
loggers:
  uvicorn.error:
    level: ERROR
    handlers: [file]
    propagate: no
