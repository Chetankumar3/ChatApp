user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 20000;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    
    split_clients "$msec$remote_addr" $log_sample {
        0.5%    1;
        * 0;
    }

    log_format timing_log 'req_time:$request_time up_resp_time:$upstream_response_time';

    access_log /var/log/nginx/sample.log timing_log if=$log_sample;

    include /etc/nginx/conf.d/*.conf;
}