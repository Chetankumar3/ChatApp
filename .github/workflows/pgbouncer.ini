[databases]
# Format: local_db_name = host=SERVICE_NAME port=5432 dbname=ACTUAL_DB_NAME
# Use 'db' (the service name in docker-compose) instead of localhost
testdb = host=10.82.176.3 port=5432 dbname=testdb

[pgbouncer]
# Administrative settings
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

# Network settings
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Housekeeping for Psycopg3/SQLAlchemy
ignore_startup_parameters = extra_float_digits, search_path
server_reset_query = DISCARD ALL