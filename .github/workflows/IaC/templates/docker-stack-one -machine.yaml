networks:
  ping-overlay:
    driver: overlay
    attachable: true   # allows `docker run --network ping-overlay` for debugging

services:
  ping-main:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/ping/ping-main:2.0
    networks:
      - ping-overlay
    env_file:
      - .env
    environment:
      - SERVICE_GRPC_PORT=50050
      - SERVICE_HTTP_PORT=8000
      - 'CONNECT_ARGS={"statement_cache_size": 0, "prepared_statement_cache_size": 0, "pool_pre_ping": true, "pool_size": 20, "max_overflow": 40, "pool_timeout": 30, "pool_recycle": 1800}'
      - ALGORITHM=HS256
    ulimits:
      nofile:  # To avoid "no file descriptors available" error. By default this will be 1024, for viretual env of docker.
        soft: 65536
        hard: 65536
    deploy:
      replicas: 2     # one per vCPU core; tune based on CPU count
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1      # rolling update one at a time
        delay: 5s 
      resources:            # prevent one replica from starving others
        limits:
          cpus: '1.0'
          memory: 3G
        reservations:
          cpus: '0.4'
          memory: 1G
    # NO ports block — internal only, gateway handles all inbound routing

  ping-cm:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/ping/ping-cm:2.0
    networks:
      - ping-overlay
    env_file:
      - .env
    environment:
      - SERVICE_GRPC_PORT=50051
      - SERVICE_HTTP_PORT=8001
      - ALGORITHM=HS256
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.4'
          memory: 512M      

  pgbouncer:
    image: edoburu/pgbouncer
    networks:
      - ping-overlay
    env_file:
      - .env
    environment:
      - ADMIN_USERS=postgres
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
    ports:
      - target: 6432
        published: 6432
        protocol: tcp
        mode: host        # host mode = direct bind, no Swarm VIP overhead for DB connections
    volumes:
      - /ping/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - /ping/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # always on the manager node
      restart_policy:
        condition: on-failure

  ping-gateway:
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/ping/ping-gateway:2.0
    networks:
      - ping-overlay
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host        # host mode so watcher.py can use actual container IPs
    env_file:
      - .env
    environment:
      - NGINX_CONF_PATH=/etc/nginx/conf.d/default.conf
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure