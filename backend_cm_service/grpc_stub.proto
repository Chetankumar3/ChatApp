syntax = "proto3";

// Implemented by the Main Service — receives messages forwarded by CM workers
service MainRouter {
    rpc RouteInboundMessage (InboundMessage) returns (RoutingAck);
}

// Implemented by CM workers — receives delivery requests from Main Service
service ConnectionManager {
    rpc DeliverOutboundMessage (OutboundMessage) returns (DeliveryAck);
}

// CM → Main: user sent a message
message InboundMessage {
    int32  fromId      = 1;
    int32  toId        = 2;
    string type        = 3;  // "direct_message" | "group_message"
    string body        = 4;
    string sentAt      = 5;  // ISO-8601 UTC
    string client_uuid = 6;
}

// Main → CM (inbound ack)
message RoutingAck {
    bool   success    = 1;
    int32  message_id = 2;
    string error      = 3;
}

// Main → CM: deliver to one or more users connected to this CM
message OutboundMessage {
    repeated int32 target_user_ids = 1;
    int32  fromId     = 2;
    int32  toId       = 3;
    string type       = 4;
    string body       = 5;
    string sentAt     = 6;
    int32  message_id = 7;
}

// CM → Main (outbound ack)
message DeliveryAck {
    bool   success = 1;
    string error   = 2;
}
